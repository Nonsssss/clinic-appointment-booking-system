<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HSU APPOINTMENT BOOKING SYSTEM</title>
    <link rel="icon" type="image/x-icon" href="/static/images/logo2.png">
  
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body class="login-page">
    <nav class="navbar">
      <div class="nav-logo">
        <div class="logo-circle">
          <img src="/static/images/logo2.png" alt="Logo" />
        </div>
        <span class="nav-title">HSU APPOINTMENT BOOKING SYSTEM</span>
      </div>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/#services">Services</a></li>
        <li><a href="/login" class="active">Login</a></li>
      </ul>
    </nav>

    <div class="login-box">
      <form id="loginForm">
        <h2>Login</h2>
        <div class="input-box">
          <span class="icon"><ion-icon name="mail"></ion-icon></span>
          <input type="email" id="email" placeholder="Institutional Email" required />
        </div>
        <small style="color: #666; font-size: 9px">
          *Freshmen may use their personal Gmail email if RTU email is not yet available.
        </small>
        <div class="input-box">
          <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
          <input type="password" id="password" placeholder="Password" required />
        </div>
        <div class="remember-forgot">
          <label><input type="checkbox" /> Remember me</label>
          <a href="#">Forgot Password?</a>
        </div>
        <button type="submit" class="btn-login" style="width: 100%; border: none; cursor: pointer">
          Login
        </button>
        <div class="register-link">
          <p>Don't have an account? <a href="/signup">Sign up</a></p>
        </div>
      </form>
    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const loginForm = document.getElementById("loginForm");

        if (loginForm) {
          loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();

            if (email === "hsu_admin@rtu.edu.ph" && password === "123456") {
              alert("Admin login successful!");
              window.location.href = "/admin";
              return;
            }

            try {
              const response = await fetch("/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password }),
              });

              const data = await response.json();

              if (!response.ok) {
                alert(data.detail || "❌ Login failed");
                return;
              }

              localStorage.clear();
              localStorage.setItem("user_id", String(data.user_id));
              localStorage.setItem("fullname", String(data.fullname));
              localStorage.setItem("email", data.email);

              alert("🎉 Login successful!");
              window.location.href = "/dashboard";
            } catch (err) {
              console.error("Login communication error:", err);
              alert("❌ Unable to reach the server.");
            }
          });
        }
      });
    </script>
  </body>
</html>
