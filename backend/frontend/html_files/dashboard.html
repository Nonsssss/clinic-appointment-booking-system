<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - HSU Appointment Booking</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body class="dashboard-page">
    <nav class="navbar">
      <div class="nav-logo">
        <div class="logo-circle">
          <img src="/static/images/logo2.png" alt="Logo" />
        </div>
        <span class="nav-title">HSU APPOINTMENT BOOKING SYSTEM</span>
      </div>
      <ul class="nav-links">
        <li><a href="/dashboard" class="nav-pill">Dashboard</a></li>
        <li><a href="/booking">Book Appointment</a></li>
        <li><a href="/appointments-page">My Appointments</a></li>
        <li><a href="/" class="nav-logout">Logout</a></li>
      </ul>
    </nav>

    <div class="dashboard-container">
      <div class="user-welcome">
        <div class="user-avatar">
          <img src="/static/images/logo4.png" alt="Avatar" />
        </div>
        <h2 id="welcome-text">Good Morning, <span id="student-name"></span>!</h2>
      </div>

      <hr class="divider" />

      <div class="dashboard-section">
        <h3>Upcoming Appointment</h3>
        <div class="appointment-cards"></div>
      </div>

      <hr class="divider" />

      <div class="dashboard-section">
        <h3>Available Services:</h3>
        <div class="service-pills">
          <a href="/booking" class="service-pill">Medical Consultation</a>
          <a href="/booking" class="service-pill">Dental Consultation</a>
          <a href="/booking" class="service-pill">Medical Clearance for Freshmen</a>
          <a href="/booking" class="service-pill">Medical Clearance for Internship</a>
          <a href="/booking" class="service-pill">Medical Clearance for U-Week</a>
        </div>
      </div>
    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        const studentNameElement = document.getElementById("student-name");
        const storedName = localStorage.getItem("fullname");
        const userId = localStorage.getItem("user_id");

        if (!userId) {
          alert("🔒 Session expired or invalid. Please log in.");
          window.location.href = "/login";
          return;
        }

        if (storedName) studentNameElement.textContent = storedName;

        const currentHour = new Date().getHours();
        let greeting = "Good Morning";
        if (currentHour >= 12 && currentHour < 18) greeting = "Good Afternoon";
        else if (currentHour >= 18 || currentHour < 5) greeting = "Good Evening";

        document.getElementById("welcome-text").innerText = `${greeting}, ${storedName}!`;

        const container = document.querySelector(".appointment-cards");

        try {
          const res = await fetch(`/appointments?user_id=${userId}`);
          const appointments = await res.json();

          container.innerHTML = "";

          if (appointments.length === 0) {
            container.innerHTML = `<div class="appt-card"><p>No upcoming appointments.</p></div>`;
            return;
          }

          appointments.forEach((app) => {
            const card = document.createElement("div");
            card.classList.add("appt-card");
            card.innerHTML = `
              <p class="appt-date">${app.date}</p>
              <p class="appt-time">${app.time}</p>
              <p class="appt-service">${app.service}</p>
              <span class="badge ${(app.status || '').toLowerCase()}">${app.status}</span>
            `;
            container.appendChild(card);
          });
        } catch (err) {
          console.error("Error loading appointments:", err);
        }

        document.querySelector(".nav-logout").addEventListener("click", (e) => {
          e.preventDefault();
          localStorage.clear();
          window.location.href = "/";
        });
      });
    </script>
  </body>
</html>
