<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HSU APPOINTMENT BOOKING SYSTEM</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body class="login-page">
    <nav class="navbar">
      <div class="nav-logo">
        <div class="logo-circle">
          <img src="/static/images/logo2.png" alt="Logo" />
        </div>
        <span class="nav-title">HSU APPOINTMENT BOOKING SYSTEM</span>
      </div>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/#services">Services</a></li>
        <li><a href="/login">Login</a></li>
      </ul>
    </nav>

    <div class="login-box">
      <form id="signupForm">
        <h2>Sign Up</h2>
        <div class="input-box">
          <span class="icon"><ion-icon name="person"></ion-icon></span>
          <input type="text" id="fullname" placeholder="Full Name" required />
        </div>
        <div class="input-box">
          <span class="icon"><ion-icon name="mail"></ion-icon></span>
          <input type="email" id="email" placeholder="Institutional Email" required />
        </div>
        <div class="input-box">
          <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
          <input type="password" id="password" placeholder="Password" required />
        </div>
        <button type="submit" class="btn-login" style="width: 100%; border: none; cursor: pointer">
          Sign Up
        </button>
        <div class="register-link">
          <p>Already have an account? <a href="/login">Login</a></p>
        </div>
      </form>
    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const signupForm = document.getElementById("signupForm");
        const fullnameInput = document.getElementById("fullname");
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");

        if (signupForm) {
          signupForm.addEventListener("submit", async function (e) {
            e.preventDefault();

            const fullname = fullnameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            if (!fullname || !email || !password) {
              alert("⚠ Please fill in all fields.");
              return;
            }

            try {
              const response = await fetch("/auth/signup", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ fullname, email, password }),
              });

              const data = await response.json();

              if (!response.ok) {
                throw new Error(data.detail || "Signup failed");
              }

              alert("🎉 Registration successful! You can now log in.");
              window.location.href = "/login";
            } catch (error) {
              console.error("Signup error:", error);
              alert("❌ Signup Error: " + (error.message || error));
            }
          });
        }
      });
    </script>
  </body>
</html>
