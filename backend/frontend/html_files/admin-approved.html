<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Approved Appointments - HSU</title>
    <link rel="icon" type="image/x-icon" href="/static/images/logo2.png">
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body class="dashboard-page">
    <nav class="navbar">
      <div class="nav-logo">
        <div class="logo-circle">
          <img src="/static/images/logo2.png" alt="Logo" />
        </div>
        <span class="nav-title">HSU APPOINTMENT BOOKING SYSTEM</span>
      </div>
      <ul class="nav-links">
        <li><a href="/admin">Appointment Requests</a></li>
        <li><a href="/admin/approved" class="nav-pill">Approved Appointments</a></li>
        <li><a href="/" class="nav-logout">Logout</a></li>
      </ul>
    </nav>

    <div class="dashboard-container">
      <div class="admin-section">
        <h3 class="booking-subtitle">APPROVED APPOINTMENTS</h3>
        <hr class="divider" />
        <div class="appointments-table-container">
          <table class="appointments-table">
            <thead>
              <tr>
                <th>Student Name</th>
                <th>Service</th>
                <th>Date</th>
                <th>Time</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="approved-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <script>
      const logoutBtn = document.querySelector(".nav-logout");
      if (logoutBtn) {
        logoutBtn.addEventListener("click", function () {
          localStorage.removeItem("userRole");
        });
      }

      let historyAppointments = [];
      let sortDirection = {};
      let currentStatusFilter = "All";
      const tableBody = document.getElementById("approved-body");

      async function fetchAppointmentHistory() {
        try {
          const response = await fetch("/appointments");
          if (!response.ok) throw new Error("Could not load data from database.");
          const allAppointments = await response.json();
          historyAppointments = allAppointments.filter((app) => {
            return (app.status || "").toLowerCase() !== "pending";
          });
          renderTable(historyAppointments);
        } catch (err) {
          console.error("Database connection failure:", err);
          tableBody.innerHTML = `
            <tr><td colspan="5" style="text-align:center; padding:20px; color: red; font-weight: bold;">
              Error: Unable to load history records from server database.
            </td></tr>`;
        }
      }

      const headers = document.querySelectorAll(".appointments-table th");
      headers.forEach((header, index) => {
        if (index === 4) {
          const arrow = document.createElement("span");
          arrow.id = "status-arrow";
          arrow.textContent = " ▼";
          header.appendChild(arrow);
          header.style.cursor = "pointer";
          header.addEventListener("click", filterStatus);
          return;
        }
        const arrow = document.createElement("span");
        arrow.id = `arrow-${index}`;
        arrow.textContent = " ⬍";
        header.appendChild(arrow);
        header.style.cursor = "pointer";
        header.addEventListener("click", function () { sortTable(index); });
      });

      function renderTable(data) {
        tableBody.innerHTML = "";
        if (data.length === 0) {
          tableBody.innerHTML = `
            <tr><td colspan="5" style="text-align:center; padding:20px;">
              No historical records found.
            </td></tr>`;
          return;
        }
        data.forEach((app) => {
          const studentName = app.patient_name || app.fullname || "Unknown Student";
          const appDate = app.date || app.appointment_date || "N/A";
          const appTime = app.time || app.appointment_time || "N/A";
          const status = app.status || "Approved";
          tableBody.innerHTML += `
            <tr>
              <td>${studentName}</td>
              <td>${app.service}</td>
              <td style="text-align:center;">${appDate}</td>
              <td style="text-align:center;">${appTime}</td>
              <td style="text-align:center;">
                <span class="badge ${status.toLowerCase()}">${status}</span>
              </td>
            </tr>`;
        });
      }

      function sortTable(columnIndex) {
        sortDirection[columnIndex] = !sortDirection[columnIndex];
        const sorted = [...historyAppointments];
        sorted.sort((a, b) => {
          const vals = (x) => [
            x.patient_name || x.fullname || "",
            x.service,
            x.date || x.appointment_date || "",
            x.time || x.appointment_time || ""
          ];
          let valueA = vals(a)[columnIndex];
          let valueB = vals(b)[columnIndex];
          if (columnIndex === 2) {
            return sortDirection[columnIndex]
              ? new Date(valueA) - new Date(valueB)
              : new Date(valueB) - new Date(valueA);
          }
          if (columnIndex === 3) {
            return sortDirection[columnIndex]
              ? convertTime(valueA) - convertTime(valueB)
              : convertTime(valueB) - convertTime(valueA);
          }
          return sortDirection[columnIndex]
            ? valueA.toString().localeCompare(valueB.toString())
            : valueB.toString().localeCompare(valueA.toString());
        });
        renderTable(sorted);
        updateArrows(columnIndex);
      }

      function convertTime(timeStr) {
        if (!timeStr || timeStr === "N/A") return 0;
        try {
          const [time, modifier] = timeStr.split(" ");
          let [hours, minutes] = time.split(":").map(Number);
          if (modifier === "PM" && hours !== 12) hours += 12;
          if (modifier === "AM" && hours === 12) hours = 0;
          return hours * 60 + minutes;
        } catch (e) { return 0; }
      }

      function updateArrows(columnIndex) {
        document.querySelectorAll("th span").forEach((span) => {
          if (span.id !== "status-arrow") span.textContent = " ⬍";
        });
        document.getElementById(`arrow-${columnIndex}`).textContent =
          sortDirection[columnIndex] ? " ⬆️" : " ⬇️";
      }

      function filterStatus() {
        if (currentStatusFilter === "All") currentStatusFilter = "Approved";
        else if (currentStatusFilter === "Approved") currentStatusFilter = "Rejected";
        else currentStatusFilter = "All";

        let filtered = [...historyAppointments];
        if (currentStatusFilter !== "All") {
          filtered = filtered.filter((app) =>
            (app.status || "").toLowerCase() === currentStatusFilter.toLowerCase()
          );
        }
        renderTable(filtered);
        document.getElementById("status-arrow").textContent =
          currentStatusFilter === "All" ? " ▼" : ` (${currentStatusFilter})`;
      }

      fetchAppointmentHistory();
    </script>
  </body>
</html>
