<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Appointments - HSU</title>

    <link rel="stylesheet" href="../css/style.css">

</head>

<body class="dashboard-page">

    <!-- NAVBAR -->
    <nav class="navbar">

        <div class="nav-logo">

            <div class="logo-circle">
                <img src="../images/logo2.png" alt="Logo">
            </div>

            <span class="nav-title">
                HSU APPOINTMENT BOOKING SYSTEM
            </span>

        </div>

        <ul class="nav-links">

            <li>
                <a href="dashboard.html">
                    Dashboard
                </a>
            </li>

            <li>
                <a href="booking.html">
                    Book Appointment
                </a>
            </li>

            <li>
                <a href="appointments.html" class="nav-pill">
                    My Appointments
                </a>
            </li>

            <li>
                <a href="index.html" class="nav-logout">
                    Logout
                </a>
            </li>

        </ul>

    </nav>

    <!-- MAIN -->
    <div class="dashboard-container">

        <h3 class="booking-subtitle">
            APPOINTMENT HISTORY
        </h3>

        <hr class="divider">

        <!-- TABLE -->
        <div class="appointments-table-container">

            <table class="appointments-table">

                <thead>

                    <tr>
                        <th>Service</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Status</th>
                    </tr>

                </thead>

                <!-- DYNAMIC CONTENT -->
                <tbody id="appointmentHistory"></tbody>

            </table>

        </div>

    </div>

    <!-- IONICONS -->
    <script type="module"
    src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js">
    </script>

    <script nomodule
    src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js">
    </script>

    <!-- JS -->
    <script>

    // =========================
    // LOAD APPOINTMENTS
    // =========================
    document.addEventListener("DOMContentLoaded", () => {

        // TABLE BODY
        const appointmentContainer =
        document.getElementById("appointmentHistory");

        // GET SAVED APPOINTMENTS
        let appointments =
        JSON.parse(localStorage.getItem("appointments")) || [];

        // CLEAR DEFAULT CONTENT
        appointmentContainer.innerHTML = "";

        // =========================
        // NO APPOINTMENTS
        // =========================
        if (appointments.length === 0) {

            appointmentContainer.innerHTML = `
                <tr>
                    <td colspan="4"
                    style="
                    text-align:center;
                    padding: 30px;
                    font-size:18px;
                    ">
                        No appointments yet.
                    </td>
                </tr>
            `;

            return;
        }

        // =========================
        // DISPLAY APPOINTMENTS
        // =========================
        appointments.forEach(appointment => {

            let badgeClass = "";

            // STATUS DESIGN
            if (appointment.status === "Pending") {
                badgeClass = "pending";
            }

            if (appointment.status === "Completed") {
                badgeClass = "done";
            }

            // CREATE TABLE ROW
            const row = document.createElement("tr");

            row.innerHTML = `
                <td>${appointment.service}</td>
                <td>${appointment.date}</td>
                <td>${appointment.time}</td>

                <td>
                    <span class="badge ${badgeClass}">
                        ${appointment.status}
                    </span>
                </td>
            `;

            appointmentContainer.appendChild(row);

        });

    });

    </script>

</body>

</html>
