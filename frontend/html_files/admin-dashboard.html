         <thead>
    <tr>

        <th>Service</th>

        <th style="text-align: center;">Time</th>
        <th style="text-align: center;">Status</th>

    </tr>
</thead>
          <tbody id="requests-body">
           <tr>
    <td>Mingyu</td>
    <td>Medical Consultation</td>
    <td style="text-align: center;">May 18, 2026</td>
    <td style="text-align: center;">9:00 AM</td>
    <td style="text-align: center;"><span class="badge pending">Pending</span></td>
    <td style="text-align: center;">
        <button class="btn-approve">Approve</button>
        <button class="btn-reject">Reject</button>
    </td>
</tr>
<tr>
    <td>Hoshi</td>
    <td>Dental Consultation</td>
    <td style="text-align: center;">May 19, 2026</td>

    <td style="text-align: center;">
        <button class="btn-approve">Approve</button>
        <button class="btn-reject">Reject</button>
    </td>
</tr>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
