<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - HSU</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="dashboard-page">

<nav class="navbar">
    <div class="nav-logo">
        <div class="logo-circle">
            <img src="../images/logo2.png" alt="Logo">
        </div>
        <span class="nav-title">HSU APPOINTMENT BOOKING SYSTEM</span>
    </div>

    <ul class="nav-links">
        <li><a href="admin-dashboard.html">Appointment Requests</a></li>
        <li><a href="admin-approved.html">Approved Appointments</a></li>
        <li><a href="index.html" class="nav-logout">Logout</a></li>
    </ul>
</nav>

<div class="dashboard-container">
    <div class="admin-section">

        <h3 class="booking-subtitle">APPOINTMENT REQUESTS</h3>
        <hr class="divider">

        <div class="appointments-table-container">
            <table class="appointments-table">

                <thead>
                    <tr>
                        <th>Student Name</th>
                        <th>Service</th>
                        <th style="text-align:center;">Date</th>
                        <th style="text-align:center;">Time</th>
                        <th style="text-align:center;">Status</th>
                        <th style="text-align:center;">Action</th>
                    </tr>
                </thead>

                <tbody id="requests-body"></tbody>

            </table>
        </div>

    </div>
</div>

<script>

let pendingAppointments =
    JSON.parse(localStorage.getItem("pendingAppointments")) || [];

let processedAppointments =
    JSON.parse(localStorage.getItem("processedAppointments")) || [];

   //LOGOUT

document.querySelector(".nav-logout").addEventListener("click", () => {
    localStorage.removeItem("userRole");
});

//RENDER TABLE

function renderTable() {
    const tableBody = document.getElementById("requests-body");
    tableBody.innerHTML = "";

    if (pendingAppointments.length === 0) {
        tableBody.innerHTML = `
            <tr>
                <td colspan="6" style="text-align:center; padding:20px;">
                    No pending appointment requests.
                </td>
            </tr>
        `;
        return;
    }

    pendingAppointments.forEach((app, index) => {
        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${app.name}</td>
            <td>${app.service}</td>
            <td style="text-align:center;">${app.date}</td>
            <td style="text-align:center;">${app.time}</td>
            <td style="text-align:center;">
                <span class="badge pending">Pending</span>
            </td>
            <td style="text-align:center;">
                <button class="btn-approve">Approve</button>
                <button class="btn-reject">Reject</button>
            </td>
        `;

        row.querySelector(".btn-approve").onclick = () =>
            processAppointment(index, "Approved");

        row.querySelector(".btn-reject").onclick = () =>
            processAppointment(index, "Rejected");

        tableBody.appendChild(row);
    });
}

//PROCESS APPOINTMENT

function processAppointment(index, status) {

    const appointment = pendingAppointments[index];

    processedAppointments.push({
        ...appointment,
        status
    });

    localStorage.setItem(
        "processedAppointments",
        JSON.stringify(processedAppointments)
    );

    pendingAppointments.splice(index, 1);

    localStorage.setItem(
        "pendingAppointments",
        JSON.stringify(pendingAppointments)
    );

    renderTable();
}

//Sorting and Filtering
let sortDirection = {};

document.querySelectorAll(".appointments-table th").forEach((th, index) => {
    if (index >= 4) return;

    th.style.cursor = "pointer";

    const arrow = document.createElement("span");
    arrow.textContent = " ⬍";
    th.appendChild(arrow);

    th.addEventListener("click", () => sortTable(index));
});

function sortTable(columnIndex) {

    sortDirection[columnIndex] = !sortDirection[columnIndex];

    pendingAppointments.sort((a, b) => {

        let valA = Object.values(a)[columnIndex];
        let valB = Object.values(b)[columnIndex];

        return sortDirection[columnIndex]
            ? valA.localeCompare(valB)
            : valB.localeCompare(valA);
    });

    renderTable();
}

//INIT

renderTable();

</script>

</body>
</html>
