<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed - HSU</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="dashboard-page">

  <nav class="navbar">
    <div class="nav-logo">
      <div class="logo-circle">
        <img src="../images/logo2.png" alt="Logo">
      </div>
      <span class="nav-title">HSU APPOINTMENT BOOKING SYSTEM</span>
    </div>
    <ul class="nav-links">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="booking.html" class="nav-pill">Book Appointment</a></li>
      <li><a href="appointments.html">My Appointments</a></li>
      <li><a href="index.html" class="nav-logout">Logout</a></li>
    </ul>
  </nav>

  <div class="dashboard-container">
    <div class="confirmation-box">
      <p>Your Appointment is already booked!</p>
      <p>Please wait on your gmail for confirmation.</p>
    </div>
  </div>

  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

  <script>
    // Get buttons
const dashboardBtn = document.getElementById("dashboardBtn");
const bookBtn = document.getElementById("bookBtn");
const myAppointmentsBtn = document.getElementById("myAppointmentsBtn");
const logoutBtn = document.getElementById("logoutBtn");

// Sections
const bookingForm = document.getElementById("bookingForm");
const alreadyBookedMessage = document.getElementById("alreadyBookedMessage");

// Check if user already has appointment
const hasAppointment = localStorage.getItem("hasAppointment"); // *localStorage * paiba na lang po sa backend

// When page loads
window.addEventListener("load", () => {
    if (hasAppointment === "true") {
        bookingForm.style.display = "none";
        alreadyBookedMessage.style.display = "block";
    }
});

// Dashboard (go to dashboard page)
dashboardBtn.addEventListener("click", () => {
    window.location.href = "dashboard.html";
});

// Book Appointment (refresh ONLY) 
bookBtn.addEventListener("click", () => {
    location.reload();
});

// My Appointments (go to my appointments page)
myAppointmentsBtn.addEventListener("click", () => {
    window.location.href = "my-appointments.html";
});

// Logout (go back to login page)
logoutBtn.addEventListener("click", () => {
    localStorage.clear();
    sessionStorage.clear();
    window.location.href = "login.html";
});


// CALL THIS WHEN USER SUCCESSFULLY BOOKS
function completeBooking() {
    // Save booking state
    localStorage.setItem("hasAppointment", "true");

    // Hide form, show message
    bookingForm.style.display = "none";
    alreadyBookedMessage.style.display = "block";
}
  </script>
</body>
</html>
