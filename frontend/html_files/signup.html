<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSU APPOINTMENT BOOKING SYSTEM</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="login-page">

  <nav class="navbar">
    <div class="nav-logo">
      <div class="logo-circle">
        <img src="../images/logo2.png" alt="Logo">
      </div>
      <span class="nav-title">HSU APPOINTMENT BOOKING SYSTEM</span>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#services">Services</a></li>
      <li><a href="login.html">Login</a></li>
    </ul>
  </nav>

    <div class="login-box">
        <form action="">
            <h2>Sign Up</h2>

            <!-- ⚠️ NOTE: Only email + password exist in your HTML -->
            <div class="input-box">
                <span class="icon"><ion-icon name="mail"></ion-icon></span>
                <input type="email" placeholder="Email" required>
            </div>

            <div class="input-box">
                <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
                <input type="password" placeholder="Password" required>
            </div>

            <a href="login.html" class="btn-login">Sign Up</a>

            <div class="register-link">
                <p>Already have an account? <a href="login.html">Login</a></p>
            </div>

        </form>
    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <script>
    document.addEventListener("DOMContentLoaded", () => {

        const signupBtn = document.querySelector(".btn-login");
        const inputs = document.querySelectorAll(".input-box input");

        const emailInput = inputs[0];
        const passwordInput = inputs[1];

        if (signupBtn) {
            signupBtn.addEventListener("click", function (e) {

                e.preventDefault(); 

                const email = emailInput.value.trim();
                const password = passwordInput.value.trim();

                // Check empty fields
                if (!email || !password) {
                    alert("Please fill in all fields.");
                    return;
                }

                // Basic email validation
                if (!email.includes("@")) {
                    alert("Please enter a valid email.");
                    return;
                }

                // Create user object
                const user = {
                    email: email,
                    password: password
                };

                // Save to localStorage
                localStorage.setItem("user", JSON.stringify(user));

                alert("Account created successfully!");

                // Redirect to login page
                window.location.href = "login.html";
            });
        }

    });
    </script>

</body>
</html>
