<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSU APPOINTMENT BOOKING SYSTEM</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="login-page">

  <nav class="navbar">
    <div class="nav-logo">
      <div class="logo-circle">
        <img src="../images/logo2.png" alt="Logo">
      </div>
      <span class="nav-title">HSU APPOINTMENT BOOKING SYSTEM</span>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#services">Services</a></li>
      <li><a href="login.html" class="active">Login</a></li>
    </ul>
  </nav>

    <div class="login-box">
        <form action="">
            <h2>Login</h2>

            <div class="input-box">
                <span class="icon"><ion-icon name="mail"></ion-icon></span>
                <input type="email" placeholder="Institutional Email" required>
            </div>

            <div class="input-box">
                <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
                <input type="password" placeholder="Password" required>
            </div>

            <div class="remember-forgot">
                <label><input type="checkbox"> Remember me</label>
                <a href="#">Forgot Password?</a>
            </div>

            <!-- stays as <a>, JS will control it -->
            <a href="dashboard.html" class="btn-login">Login</a>

            <div class="register-link">
                <p>Don't have an account? <a href="signup.html">Sign up</a></p>
            </div>

        </form>
    </div>

    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <script>
    document.addEventListener("DOMContentLoaded", () => {

    const loginBtn = document.querySelector(".btn-login");
    const inputs = document.querySelectorAll(".input-box input");

    const emailInput = inputs[0];
    const passwordInput = inputs[1];

    function isValidInstitutionalEmail(email) {
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return emailPattern.test(email) && email.endsWith("@rtu.edu.ph");
    }

    if (loginBtn) {
    loginBtn.addEventListener("click", function () {

        event.preventDefault();

        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        if (!email || !password) {
            alert("Please fill in all fields.");
            return;
        }

        if (email === "hsu_admin@rtu.edu.ph" && password === "123456") {
            alert("Admin login successful!");
            window.location.href = "admin-dashboard.html";
            return; 
        }

        if (!isValidInstitutionalEmail(email)) {
            alert("Warning: Email is not an institutional email (@rtu.edu.ph).");
            return;
        }

        alert("Login successful!");
        window.location.href = "dashboard.html";
    });
        }
    });
</script>

</body>
</html>
