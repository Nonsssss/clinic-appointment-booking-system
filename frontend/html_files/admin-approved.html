<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Approved Appointments - HSU</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="dashboard-page">

  <nav class="navbar">
    <div class="nav-logo">
      <div class="logo-circle">
        <img src="../images/logo2.png" alt="Logo">
      </div>
      <span class="nav-title">HSU APPOINTMENT BOOKING SYSTEM</span>
    </div>
    <ul class="nav-links">
      <li><a href="admin-dashboard.html">Appointment Requests</a></li>
      <li><a href="admin-approved.html" class="nav-pill">Approved Appointments</a></li>
      <li><a href="index.html" class="nav-logout">Logout</a></li>
    </ul>
  </nav>

  <div class="dashboard-container">
    <div class="admin-section">
      <h3 class="booking-subtitle">APPROVED APPOINTMENTS</h3>
      <hr class="divider">
      <div class="appointments-table-container">
        <table class="appointments-table">
          <thead>
            <tr>
              <th>Student Name</th>
              <th>Service</th>
              <th>Date</th>
              <th>Time</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="approved-body">
            <tr>
              <td>Mingyu</td>
              <td>Medical Consultation</td>
              <td>May 15, 2026</td>
              <td>9:00 AM</td>
              <td><span class="badge done">Approved</span></td>
            </tr>
            <tr>
              <td>Hoshi</td>
              <td>Dental Consultation</td>
              <td>May 16, 2026</td>
              <td>2:00 PM</td>
              <td><span class="badge done">Approved</span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

  <script>
    // LOGOUT

    const logoutBtn =
        document.querySelector(".nav-logout");

    if (logoutBtn) {

        logoutBtn.addEventListener(
            "click",
            function () {

                localStorage.removeItem(
                    "userRole"
                );
            }
        );
    }

    // SORT VARIABLES

    let sortDirection = {};

    let currentStatusFilter = "All";

    // LOAD PROCESSED APPOINTMENTS

    const processedAppointments =
        JSON.parse(
            localStorage.getItem(
                "processedAppointments"
            )
        ) || [];

    const tableBody =
        document.getElementById(
            "approved-body"
        );

    // ADD DROPDOWN ARROWS
    const headers =
        document.querySelectorAll(
            ".appointments-table th"
        );

    headers.forEach((header, index) => {

        // Status column
        if (index === 4) {

            const arrow =
                document.createElement("span");

            arrow.id = "status-arrow";

            arrow.textContent = " ▼";

            header.appendChild(arrow);

            header.style.cursor = "pointer";

            header.addEventListener(
                "click",
                filterStatus
            );

            return;
        }

        const arrow =
            document.createElement("span");

        arrow.id = `arrow-${index}`;

        arrow.textContent = " ⬍";

        header.appendChild(arrow);

        header.style.cursor = "pointer";

        header.addEventListener(
            "click",
            function () {

                sortTable(index);
            }
        );
    });

    // EMPTY BY DEFAULT

    if (processedAppointments.length === 0) {

        tableBody.innerHTML = `
            <tr>
                <td colspan="5"
                    style="
                        text-align:center;
                        padding:20px;
                    ">
                    No processed appointments yet.
                </td>
            </tr>
        `;

    } else {

        renderTable(processedAppointments);
    }

    // RENDER TABLE

    function renderTable(data) {

        tableBody.innerHTML = "";

        data.forEach(app => {

            const row = `
                <tr>

                    <td>
                        ${app.name}
                    </td>

                    <td>
                        ${app.service}
                    </td>

                    <td style="text-align:center;">
                        ${app.date}
                    </td>

                    <td style="text-align:center;">
                        ${app.time}
                    </td>

                    <td style="text-align:center;">

                        <span class="badge ${
                            app.status === "Approved"
                                ? "approved"
                                : "rejected"
                        }">

                            ${app.status}

                        </span>

                    </td>

                </tr>
            `;

            tableBody.innerHTML += row;
        });

        // Empty state
        if (data.length === 0) {

            tableBody.innerHTML = `
                <tr>
                    <td colspan="5"
                        style="
                            text-align:center;
                            padding:20px;
                        ">
                        No appointments found.
                    </td>
                </tr>
            `;
        }
    }

    // SORT TABLE

    function sortTable(columnIndex) {

        sortDirection[columnIndex] =
            !sortDirection[columnIndex];

        const sorted =
            [...processedAppointments];

        sorted.sort((a, b) => {

            let valuesA = [
                a.name,
                a.service,
                a.date,
                a.time
            ];

            let valuesB = [
                b.name,
                b.service,
                b.date,
                b.time
            ];

            let valueA =
                valuesA[columnIndex];

            let valueB =
                valuesB[columnIndex];

            // DATE SORT
            if (columnIndex === 2) {

                return sortDirection[columnIndex]
                    ? new Date(valueA)
                      - new Date(valueB)
                    : new Date(valueB)
                      - new Date(valueA);
            }

            // TIME SORT
            if (columnIndex === 3) {

                return sortDirection[columnIndex]
                    ? convertTime(valueA)
                      - convertTime(valueB)
                    : convertTime(valueB)
                      - convertTime(valueA);
            }

            // TEXT SORT
            return sortDirection[columnIndex]
                ? valueA.localeCompare(valueB)
                : valueB.localeCompare(valueA);
        });

        renderTable(sorted);

        updateArrows(columnIndex);
    }

    // TIME CONVERTER

    function convertTime(timeStr) {

        const [time, modifier] =
            timeStr.split(" ");

        let [hours, minutes] =
            time.split(":").map(Number);

        if (
            modifier === "PM"
            && hours !== 12
        ) {
            hours += 12;
        }

        if (
            modifier === "AM"
            && hours === 12
        ) {
            hours = 0;
        }

        return hours * 60 + minutes;
    }

    // UPDATE SORT ARROWS

    function updateArrows(columnIndex) {

        document.querySelectorAll("th span")
            .forEach(span => {

                if (
                    span.id !== "status-arrow"
                ) {
                    span.textContent = " ⬍";
                }
            });

        document.getElementById(
            `arrow-${columnIndex}`
        ).textContent =
            sortDirection[columnIndex]
                ? " ⬆️"
                : " ⬇️";
    }

    // FILTER STATUS

    function filterStatus() {

        if (
            currentStatusFilter === "All"
        ) {

            currentStatusFilter =
                "Approved";
        }

        else if (
            currentStatusFilter === "Approved"
        ) {

            currentStatusFilter =
                "Rejected";
        }

        else {

            currentStatusFilter =
                "All";
        }

        let filtered =
            [...processedAppointments];

        if (
            currentStatusFilter !== "All"
        ) {

            filtered =
                filtered.filter(app =>

                    app.status ===
                    currentStatusFilter
                );
        }

        renderTable(filtered);

        document.getElementById(
            "status-arrow"
        ).textContent =

            currentStatusFilter === "All"
                ? " ▼"
                : ` ${currentStatusFilter}`;
    }

  </script>

</body>
</html>
