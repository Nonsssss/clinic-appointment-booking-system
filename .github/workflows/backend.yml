name: FastAPI CI/CD

on:
  push:
    branches:
      - main
      - dev 

  pull_request:
    branches:
      - main
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:latest
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: clinic_booking_system
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
        
      - name: Wait for MYSQL
        run: |
          sudo apt-get install -y mysql-client until mysql -h 127.0.0.1 -u root -proot -e "SHOW DATABASES;" ; do sleep 5; done

      - name: Import SQL Database
        run: |
         mysql -h 127.0.0.1 -u root -proot clinic_booking_system < backend/clinic_booking_system.sql

      - name: Run FASTAPI check
        env:
          DATABASE_URL: mysql+pymysql://root:root@127.0.0.1:3306/clinic_booking_system
        run: |
          cd backend
          python -c "from database.db import engine; print(engine)" 
      - name: Start FastAPI server test
        env:
          DATABASE_URL: DATABASE_URL: mysql+pymysql://root:root@127.0.0.1:3306/clinic_booking_system
        run: |
          cd backend
          timeout 15s uvicorn main:app --host 0.0.0.0 --
    
