name: FastAPI CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: clinic_booking_system
          MYSQL_ROOT_HOST: "%"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysql -h 127.0.0.1 -u root -proot -e "SELECT 1" && break
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Import SQL Database
        run: |
          mysql -h 127.0.0.1 -u root -proot clinic_booking_system < backend/database/clinic_booking_system.sql

      - name: Run FastAPI check
        env:
          DATABASE_URL: mysql+pymysql://root:root@127.0.0.1:3306/clinic_booking_system
        run: |
          cd backend
          python -c "from database.db import engine; print(engine)"

      - name: Start FastAPI server test
        env:
          DATABASE_URL: mysql+pymysql://root:root@127.0.0.1:3306/clinic_booking_system
        run: |
          cd backend
          timeout 15s uvicorn main:app --host 0.0.0.0 --port 8000