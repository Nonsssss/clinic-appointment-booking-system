name: FastAPI CI/CD
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: clinic_booking_system
          MYSQL_ROOT_HOST: "%"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install MySQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

      - name: Setup MySQL user for app
        run: |
          mysql -h 127.0.0.1 -u root -proot -e "
          CREATE USER IF NOT EXISTS 'appuser'@'%' IDENTIFIED BY 'app123';
          GRANT ALL PRIVILEGES ON clinic_booking_system.* TO 'appuser'@'%';
          FLUSH PRIVILEGES;
          "

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -u root -proot && break
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Import SQL Database
        run: |
          mysql -h 127.0.0.1 -u root -proot clinic_booking_system < backend/database/clinic_booking_system.sql

      - name: Test DB connection via SQLAlchemy
        env:
          MYSQLHOST: 127.0.0.1
          MYSQLPORT: 3306
          MYSQLUSER: appuser
          MYSQLPASSWORD: app123
          MYSQLDATABASE: clinic_booking_system
        run: |
          cd backend
          python - << 'EOF'
          from database.db import engine
          from sqlalchemy import text
          with engine.connect() as conn:
              result = conn.execute(text("SELECT 1"))
              print("DB CONNECTED:", result.scalar())
          EOF

      - name: Run FastAPI import check
        env:
          MYSQLHOST: 127.0.0.1
          MYSQLPORT: 3306
          MYSQLUSER: appuser
          MYSQLPASSWORD: app123
          MYSQLDATABASE: clinic_booking_system
        run: |
          cd backend
          python -c "import main; print('FastAPI app imports OK')"

      # Only deploy on push to main (not on pull requests)
      - name: Install Railway CLI
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_NAME }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}